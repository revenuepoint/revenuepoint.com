name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_SF_OID: ${{ secrets.NEXT_PUBLIC_SF_OID }}
          NEXT_PUBLIC_CALENDLY_URL: ${{ secrets.NEXT_PUBLIC_CALENDLY_URL }}
          NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
          NEXT_PUBLIC_SF_REVENUE_FIELD_ID: ${{ secrets.NEXT_PUBLIC_SF_REVENUE_FIELD_ID }}
          NEXT_PUBLIC_SF_SOURCE_FIELD_ID: ${{ secrets.NEXT_PUBLIC_SF_SOURCE_FIELD_ID }}
          NEXT_PUBLIC_SF_PAGE_URL_FIELD_ID: ${{ secrets.NEXT_PUBLIC_SF_PAGE_URL_FIELD_ID }}
          NEXT_PUBLIC_DATADOG_APPLICATION_ID: ${{ secrets.NEXT_PUBLIC_DATADOG_APPLICATION_ID }}
          NEXT_PUBLIC_DATADOG_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_DATADOG_CLIENT_TOKEN }}
          NEXT_PUBLIC_DATADOG_SITE: ${{ secrets.NEXT_PUBLIC_DATADOG_SITE }}
          NEXT_PUBLIC_DATADOG_SERVICE: ${{ secrets.NEXT_PUBLIC_DATADOG_SERVICE }}
          NEXT_PUBLIC_DATADOG_ENV: ${{ secrets.NEXT_PUBLIC_DATADOG_ENV }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
