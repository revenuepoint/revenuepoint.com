<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Five source systems converging into a central warehouse, then radiating out to dashboards, reports, and agents">
  <rect width="1600" height="900" fill="#F4EFE6"/>
  <text x="1560" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="300" font-size="780" fill="#1A1612" fill-opacity="0.045" text-anchor="end">W</text>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1A1612">
    <text x="120" y="120" font-size="22" letter-spacing="6" font-weight="700">INSIGHTS · II</text>
    <line x1="120" y1="148" x2="280" y2="148" stroke="#C4BCA8" stroke-width="1"/>
  </g>

  <!-- left: 5 source labels -->
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="26" fill="#1A1612" text-anchor="end">
    <text x="320" y="278">CRM</text>
    <text x="320" y="378">ERP</text>
    <text x="320" y="478">Accounting</text>
    <text x="320" y="578">Support</text>
    <text x="320" y="678">Web &amp; ads</text>
  </g>

  <!-- left feed lines into warehouse -->
  <g stroke="#1A1612" stroke-width="1" fill="none">
    <path d="M340 270 C 460 270, 580 460, 700 460"/>
    <path d="M340 370 C 460 370, 580 460, 700 460"/>
    <path d="M340 470 L 700 470"/>
    <path d="M340 570 C 460 570, 580 480, 700 480"/>
    <path d="M340 670 C 460 670, 580 490, 700 490"/>
  </g>

  <!-- central warehouse -->
  <g>
    <rect x="700" y="380" width="200" height="180" fill="#8B0A39"/>
    <text x="800" y="450" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="4" fill="#F4EFE6" text-anchor="middle" font-weight="700">DATA</text>
    <text x="800" y="510" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-style="italic" fill="#F4EFE6" text-anchor="middle">warehouse</text>
  </g>

  <!-- right: outflow lines -->
  <g stroke="#1A1612" stroke-width="1" fill="none">
    <path d="M900 410 C 1020 410, 1140 320, 1260 320"/>
    <path d="M900 460 C 1020 460, 1140 440, 1260 440"/>
    <path d="M900 480 C 1020 480, 1140 540, 1260 540"/>
    <path d="M900 530 C 1020 530, 1140 640, 1260 640"/>
  </g>

  <!-- right: 4 consumer labels -->
  <g font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="26" fill="#1A1612">
    <text x="1280" y="328">Dashboards</text>
    <text x="1280" y="448">Reports</text>
    <text x="1280" y="548">Agents</text>
    <text x="1280" y="648">AI chat</text>
  </g>

  <line x1="120" y1="780" x2="1480" y2="780" stroke="#C4BCA8" stroke-width="1"/>
  <text x="120" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="22" fill="#2D261E">The warehouse: where every other layer of the business reads from.</text>
</svg>
