<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cover: AI can produce a confident briefing in thirty seconds. Most are wrong in ways that take a day to find.">
  <rect width="1600" height="1000" fill="#1A1612"/>

  <text x="120" y="1140" font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="300" font-size="600" fill="#A4391E" fill-opacity="0.32" text-anchor="start">verified.</text>

  <line x1="120" y1="148" x2="142" y2="148" stroke="#A4391E" stroke-width="1"/>
  <text x="158" y="155" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="3.2" font-weight="500" fill="#F4EFE6" fill-opacity="0.7">INSIGHTS · VII</text>

  <g font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#F4EFE6">
    <text x="120" y="320" font-size="76">AI can produce a confident</text>
    <text x="120" y="415" font-size="76">briefing in thirty seconds. Most</text>
    <text x="120" y="510" font-size="76">are wrong in ways that take a day.</text>
  </g>
</svg>
