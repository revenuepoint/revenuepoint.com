<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cover: Static thresholds don't survive real business metrics. Trend, seasonality, and noise demand more.">
  <rect width="1600" height="1000" fill="#A4391E"/>

  <text x="120" y="1140" font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="300" font-size="600" fill="#F4EFE6" fill-opacity="0.11" text-anchor="start">outlier.</text>

  <line x1="120" y1="148" x2="142" y2="148" stroke="#F4EFE6" stroke-opacity="0.55" stroke-width="1"/>
  <text x="158" y="155" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="3.2" font-weight="500" fill="#F4EFE6" fill-opacity="0.8">INSIGHTS · IV</text>

  <g font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#F4EFE6">
    <text x="120" y="320" font-size="76">Static thresholds don&#8217;t survive</text>
    <text x="120" y="415" font-size="76">real business metrics — trend,</text>
    <text x="120" y="510" font-size="76">seasonality, and noise demand more.</text>
  </g>
</svg>
