<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cover: Agents propose, humans approve, systems execute. The approval step is what makes it safe.">
  <rect width="1600" height="1000" fill="#0F1A2B"/>

  <!-- giant background watermark concept word — bleeds off right and bottom -->
  <text x="120" y="1140" font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="300" font-size="600" fill="#F4EFE6" fill-opacity="0.10" text-anchor="start">propose.</text>

  <!-- eyebrow -->
  <line x1="120" y1="148" x2="142" y2="148" stroke="#F4EFE6" stroke-opacity="0.5" stroke-width="1"/>
  <text x="158" y="155" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="3.2" font-weight="500" fill="#F4EFE6" fill-opacity="0.75">INSIGHTS · I</text>

  <!-- deck -->
  <g font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#F4EFE6">
    <text x="120" y="320" font-size="76">Agents propose. Humans approve.</text>
    <text x="120" y="415" font-size="76">Systems execute. The approval</text>
    <text x="120" y="510" font-size="76">step is what makes it safe.</text>
  </g>
</svg>
