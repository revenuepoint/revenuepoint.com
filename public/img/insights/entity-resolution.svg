<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cover: One customer appears two or three times across systems, different enough to look separate.">
  <rect width="1600" height="1000" fill="#FAF6EC"/>

  <text x="120" y="1140" font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="300" font-size="600" fill="#C39A4A" fill-opacity="0.45" text-anchor="start">singular.</text>

  <line x1="120" y1="148" x2="142" y2="148" stroke="#C39A4A" stroke-width="1"/>
  <text x="158" y="155" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="3.2" font-weight="500" fill="#7A6F5C">INSIGHTS · V</text>

  <g font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#1A1612">
    <text x="120" y="320" font-size="76">One customer appears two or three</text>
    <text x="120" y="415" font-size="76">times across systems, different</text>
    <text x="120" y="510" font-size="76">enough to look separate.</text>
  </g>
</svg>
