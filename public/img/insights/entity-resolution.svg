<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Three slightly different records collapsing into one resolved entity">
  <rect width="1600" height="900" fill="#F4EFE6"/>
  <text x="1560" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="300" font-size="780" fill="#1A1612" fill-opacity="0.045" text-anchor="end">E</text>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1A1612">
    <text x="120" y="120" font-size="22" letter-spacing="6" font-weight="700">INSIGHTS · V</text>
    <line x1="120" y1="148" x2="280" y2="148" stroke="#C4BCA8" stroke-width="1"/>
  </g>

  <!-- three source records -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <!-- card 1 -->
    <rect x="180" y="280" width="320" height="100" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.2"/>
    <text x="206" y="316" font-size="14" letter-spacing="3" font-weight="700" fill="#8B0A39">CRM</text>
    <text x="206" y="356" font-size="28" font-style="italic" fill="#1A1612">Acme, Inc.</text>

    <!-- card 2 -->
    <rect x="180" y="420" width="320" height="100" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.2"/>
    <text x="206" y="456" font-size="14" letter-spacing="3" font-weight="700" fill="#8B0A39">ERP</text>
    <text x="206" y="496" font-size="28" font-style="italic" fill="#1A1612">ACME Inc</text>

    <!-- card 3 -->
    <rect x="180" y="560" width="320" height="100" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.2"/>
    <text x="206" y="596" font-size="14" letter-spacing="3" font-weight="700" fill="#8B0A39">SUPPORT</text>
    <text x="206" y="636" font-size="28" font-style="italic" fill="#1A1612">acme inc.</text>
  </g>

  <!-- converging lines -->
  <g stroke="#1A1612" stroke-width="1" fill="none">
    <path d="M500 330 C 700 330, 800 460, 1000 460"/>
    <path d="M500 470 L 1000 470"/>
    <path d="M500 610 C 700 610, 800 480, 1000 480"/>
  </g>

  <!-- golden record -->
  <g>
    <rect x="1000" y="370" width="420" height="180" fill="#8B0A39"/>
    <text x="1210" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="14" letter-spacing="4" font-weight="700" fill="#F4EFE6" text-anchor="middle">ENTITY</text>
    <text x="1210" y="492" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-style="italic" fill="#F4EFE6" text-anchor="middle">Acme, Inc.</text>
    <text x="1210" y="525" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-style="italic" fill="#F4EFE6" fill-opacity="0.75" text-anchor="middle">ent_acme_001 · lineage preserved</text>
  </g>

  <line x1="120" y1="780" x2="1480" y2="780" stroke="#C4BCA8" stroke-width="1"/>
  <text x="120" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="22" fill="#2D261E">Three records, one company. Resolve once, in the warehouse.</text>
</svg>
