<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Cover: Plain-English questions are easy for a model to answer. The hard part is the pipeline around it.">
  <rect width="1600" height="1000" fill="#C39A4A"/>

  <text x="120" y="1140" font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="300" font-size="600" fill="#1A1612" fill-opacity="0.13" text-anchor="start">defensible.</text>

  <line x1="120" y1="148" x2="142" y2="148" stroke="#1A1612" stroke-opacity="0.6" stroke-width="1"/>
  <text x="158" y="155" font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" letter-spacing="3.2" font-weight="500" fill="#1A1612" fill-opacity="0.7">INSIGHTS · III</text>

  <g font-family="Fraunces, 'Iowan Old Style', 'Apple Garamond', Georgia, serif" font-style="italic" font-weight="400" fill="#1A1612">
    <text x="120" y="320" font-size="76">Plain-English questions are easy</text>
