<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Five-stage AI reporting pipeline: question, plan, query, QC, result">
  <rect width="1600" height="900" fill="#F4EFE6"/>
  <text x="1560" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="300" font-size="780" fill="#1A1612" fill-opacity="0.045" text-anchor="end">R</text>

  <g font-family="Georgia, 'Times New Roman', serif" fill="#1A1612">
    <text x="120" y="120" font-size="22" letter-spacing="6" font-weight="700">INSIGHTS · III</text>
    <line x1="120" y1="148" x2="280" y2="148" stroke="#C4BCA8" stroke-width="1"/>
  </g>

  <!-- five stages -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <!-- 01 -->
    <rect x="100" y="380" width="240" height="160" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.5"/>
    <text x="220" y="424" font-size="14" letter-spacing="4" font-weight="700" fill="#8B0A39" text-anchor="middle">01</text>
    <text x="220" y="475" font-size="32" font-style="italic" fill="#1A1612" text-anchor="middle">Question</text>

    <!-- 02 -->
    <rect x="380" y="380" width="240" height="160" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.5"/>
    <text x="500" y="424" font-size="14" letter-spacing="4" font-weight="700" fill="#8B0A39" text-anchor="middle">02</text>
    <text x="500" y="475" font-size="32" font-style="italic" fill="#1A1612" text-anchor="middle">Plan</text>

    <!-- 03 -->
    <rect x="660" y="380" width="240" height="160" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.5"/>
    <text x="780" y="424" font-size="14" letter-spacing="4" font-weight="700" fill="#8B0A39" text-anchor="middle">03</text>
    <text x="780" y="475" font-size="32" font-style="italic" fill="#1A1612" text-anchor="middle">Query</text>

    <!-- 04 -->
    <rect x="940" y="380" width="240" height="160" fill="#FAF6EC" stroke="#1A1612" stroke-width="1.5"/>
    <text x="1060" y="424" font-size="14" letter-spacing="4" font-weight="700" fill="#8B0A39" text-anchor="middle">04</text>
    <text x="1060" y="475" font-size="32" font-style="italic" fill="#1A1612" text-anchor="middle">QC</text>

    <!-- 05 -->
    <rect x="1220" y="380" width="240" height="160" fill="#8B0A39"/>
    <text x="1340" y="424" font-size="14" letter-spacing="4" font-weight="700" fill="#F4EFE6" text-anchor="middle">05</text>
    <text x="1340" y="475" font-size="32" font-style="italic" fill="#F4EFE6" text-anchor="middle">Result</text>
  </g>

  <!-- arrows -->
  <g stroke="#1A1612" stroke-width="1.5" fill="none">
    <line x1="340" y1="460" x2="380" y2="460"/>
    <polygon points="370,454 382,460 370,466" fill="#1A1612" stroke="none"/>
    <line x1="620" y1="460" x2="660" y2="460"/>
    <polygon points="650,454 662,460 650,466" fill="#1A1612" stroke="none"/>
    <line x1="900" y1="460" x2="940" y2="460"/>
    <polygon points="930,454 942,460 930,466" fill="#1A1612" stroke="none"/>
    <line x1="1180" y1="460" x2="1220" y2="460"/>
    <polygon points="1210,454 1222,460 1210,466" fill="#1A1612" stroke="none"/>
  </g>

  <!-- provenance badge attached to result -->
  <g font-family="Georgia, 'Times New Roman', serif">
    <rect x="1240" y="580" width="200" height="60" fill="#FAF6EC" stroke="#8B0A39" stroke-width="1"/>
    <text x="1340" y="618" font-size="20" font-style="italic" fill="#8B0A39" text-anchor="middle">+ provenance</text>
  </g>

  <line x1="120" y1="780" x2="1480" y2="780" stroke="#C4BCA8" stroke-width="1"/>
  <text x="120" y="820" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="22" fill="#2D261E">From English question to a number you can defend — every stage logged.</text>
</svg>
